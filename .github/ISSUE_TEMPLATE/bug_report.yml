name: Bug report
description: Report a reproducible problem in the app, API, CLI, or MCP server.
title: "Bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for a maintainer to reproduce it.
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Web app
        - API
        - CLI
        - MCP server
        - Data pipeline
        - Documentation
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, URLs, inputs, and relevant environment variables without secrets.
      placeholder: |
        1. Run `...`
        2. Open `...`
        3. See `...`
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, versions, or links that help explain the issue.
