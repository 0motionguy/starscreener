name: nitter-health-check

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: npm ci
      - run: node scripts/check-nitter-health.mjs
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Commit nitter status update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add config/nitter-instances.json
          git diff --cached --quiet || (git commit -m "chore: nitter health update" && git push)
