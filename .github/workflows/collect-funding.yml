name: Collect Funding Signals
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated source list (techcrunch,venturebeat,sifted)'
        default: 'techcrunch,venturebeat,sifted'
      dry_run:
        description: 'Dry run'
        default: 'false'

# Phase 1B: contents:write was required for the now-removed git-push step.
# Kept as `none` (the safer default) — restore to `contents: write` if rolling
# back to file-push by reverting commit 87e3f4e.
permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - env:
          # Phase 1B: collector dual-writes funding-news to Redis. Only the
          # canonical OUT_PATH run mirrors to Redis; --output=… preview
          # runs (dry_run + tests) do NOT clobber prod.
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npm run scrape:funding -- --sources ${{ github.event.inputs.sources || 'techcrunch,venturebeat,sifted' }} --enrich ${{ github.event.inputs.dry_run == 'true' && '--output .tmp/funding-preview.json' || '' }}
      # Phase 1B (commit 87e3f4e): git-push step removed — data-store
      # writes to Redis are the durable path for funding-news. Restore
      # from git for emergency rollback.
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: funding-scraper-logs
          path: .tmp/
