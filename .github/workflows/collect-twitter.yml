name: Collect Twitter Signals

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of repos to scan"
        required: false
        default: "25"
      mode:
        description: "Collector mode (api or direct)"
        required: false
        default: "direct"
      dry_run:
        description: "Dry run (no ingestion)"
        required: false
        default: "false"
      repos:
        description: "Comma-separated repo filters (owner/name) — empty to use priority ranking"
        required: false
        default: ""

# Needed so the auto-commit step can push .data/twitter-*.jsonl back to main.
# Vercel's serverless runtime has read-only FS, so API-mode ingest can't
# persist — we must write locally in GH Actions and commit, same as funding.
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect Twitter signals
        env:
          # Apify tweet-scraper actor runs on residential IPs and returns clean
          # JSON — sidesteps Twitter's 2026 x-client-transaction-id anti-bot
          # that silently breaks the cookie-based web provider.
          TWITTER_COLLECTOR_PROVIDER: ${{ vars.TWITTER_COLLECTOR_PROVIDER || 'apify' }}
          # "direct" writes to .data/twitter-*.jsonl locally (so we can commit
          # them back to main). "api" would POST to Vercel's ingest endpoint,
          # but Vercel's filesystem is read-only / ephemeral so the writes
          # would not persist to the /twitter page.
          TWITTER_COLLECTOR_MODE: ${{ github.event.inputs.mode || 'direct' }}
          TWITTER_COLLECTOR_LIMIT: ${{ github.event.inputs.limit || '25' }}
          # 4 queries per repo = full tier-1 coverage. Tier 1 is the set of
          # "impossible to fake coincidentally" signals: repo_slug (owner/name),
          # repo_url (github.com/...), package_name (pip/npm install ...),
          # homepage_url, docs_url. Package + homepage matches are often the
          # highest-signal finds — tweets saying "npm i foo" don't hit a
          # slug/url search. Cost at 4 queries × 25 repos × 8 firings/day ≈
          # 800 actor runs/day ≈ ~$8/day at expected hit rate.
          TWITTER_COLLECTOR_QUERIES_PER_REPO: ${{ vars.TWITTER_COLLECTOR_QUERIES_PER_REPO || '4' }}
          TWITTER_COLLECTOR_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          TWITTER_COLLECTOR_REPOS: ${{ github.event.inputs.repos || '' }}
          TWITTER_COLLECTOR_BASE_URL: ${{ vars.TRENDINGREPO_URL || vars.STARSCREENER_URL || 'https://trendingrepo.com' }}
          INTERNAL_AGENT_TOKEN: ${{ secrets.INTERNAL_AGENT_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_TWITTER_ACTOR: ${{ vars.APIFY_TWITTER_ACTOR }}
          TWITTER_WEB_ACCOUNTS_JSON: ${{ secrets.TWITTER_WEB_ACCOUNTS_JSON }}
          TWITTER_GRAPHQL_SEARCH_QUERY_ID: ${{ vars.TWITTER_GRAPHQL_SEARCH_QUERY_ID }}
          # TWITTER_WEB_DEBUG: "1"  # uncomment when diagnosing empty responses
          TWITTER_COLLECTOR_RUN_ID: "gh-actions-${{ github.run_id }}-${{ github.run_attempt }}"
        run: npm run collect:twitter

      - name: Compute commit timestamp
        if: github.event.inputs.dry_run != 'true'
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit updated twitter signals
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.local"
          git add .data/twitter-repo-signals.jsonl .data/twitter-scans.jsonl .data/twitter-ingestion-audit.jsonl data/unknown-mentions.jsonl
          if git diff --quiet --staged; then
            echo "no changes to twitter data — skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh twitter signals ${TS}"
          git pull --rebase origin main
          git push

      - name: Upload collector output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: twitter-collector-logs
          path: .tmp/twitter-collector*.json
          retention-days: 3
