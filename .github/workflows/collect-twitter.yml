name: Collect Twitter Signals

on:
  schedule:
    # Every 3 hours (8×/day) instead of every 6h (4×/day). Doubles Twitter
    # signal coverage. The collector rotates across 9 Nitter mirrors with
    # per-instance health + exponential backoff, so the extra runs reuse
    # healthy mirrors instead of hammering dead ones.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of repos to scan"
        required: false
        default: "25"
      mode:
        description: "Collector mode (api or direct)"
        required: false
        default: "api"
      dry_run:
        description: "Dry run (no ingestion)"
        required: false
        default: "false"
      repos:
        description: "Comma-separated repo filters (owner/name) — empty to use priority ranking"
        required: false
        default: ""

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect Twitter signals
        env:
          # Apify tweet-scraper actor runs on residential IPs and returns clean
          # JSON — sidesteps Twitter's 2026 x-client-transaction-id anti-bot
          # that silently breaks the cookie-based web provider.
          TWITTER_COLLECTOR_PROVIDER: ${{ vars.TWITTER_COLLECTOR_PROVIDER || 'apify' }}
          TWITTER_COLLECTOR_MODE: ${{ github.event.inputs.mode || 'api' }}
          TWITTER_COLLECTOR_LIMIT: ${{ github.event.inputs.limit || '25' }}
          TWITTER_COLLECTOR_QUERIES_PER_REPO: ${{ vars.TWITTER_COLLECTOR_QUERIES_PER_REPO || '1' }}
          TWITTER_COLLECTOR_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          TWITTER_COLLECTOR_REPOS: ${{ github.event.inputs.repos || '' }}
          TWITTER_COLLECTOR_BASE_URL: ${{ vars.STARSCREENER_URL || 'https://trendingrepo.com' }}
          INTERNAL_AGENT_TOKEN: ${{ secrets.INTERNAL_AGENT_TOKEN }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_TWITTER_ACTOR: ${{ vars.APIFY_TWITTER_ACTOR }}
          TWITTER_WEB_ACCOUNTS_JSON: ${{ secrets.TWITTER_WEB_ACCOUNTS_JSON }}
          TWITTER_GRAPHQL_SEARCH_QUERY_ID: ${{ vars.TWITTER_GRAPHQL_SEARCH_QUERY_ID }}
          # TWITTER_WEB_DEBUG: "1"  # uncomment when diagnosing empty responses
          TWITTER_COLLECTOR_RUN_ID: "gh-actions-${{ github.run_id }}-${{ github.run_attempt }}"
        run: npm run collect:twitter

      - name: Upload collector output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: twitter-collector-logs
          path: .tmp/twitter-collector*.json
          retention-days: 3
