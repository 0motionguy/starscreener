name: Cron - AISO drain

# Fires POST /api/cron/aiso-drain every 30 min at :00 and :30 UTC.
# The queue drain pops at most `limit` rows per run with a 3s gap
# between external scanner calls; default limit=10 keeps a single
# run bounded to ~30s of external pressure. Short interval is fine
# because the backing queue is per-repo deduped.
#
# Required repo config:
#   secrets.CRON_SECRET     — must match server CRON_SECRET env
#   vars.STARSCREENER_URL   — optional; defaults to prod URL

on:
  schedule:
    - cron: "0,30 * * * *"  # UTC, every hour at :00 and :30
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cron-aiso-drain
  cancel-in-progress: false

env:
  BASE_URL: ${{ vars.STARSCREENER_URL || 'https://trendingrepo.com' }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/cron/aiso-drain
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is unset — refusing to fire unauthenticated"
            exit 1
          fi
          code=$(curl -sS -o /tmp/out -w "%{http_code}" -X POST \
            "$BASE_URL/api/cron/aiso-drain" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"limit":10}')
          echo "HTTP $code"
          if command -v jq >/dev/null 2>&1 && jq . /tmp/out >/dev/null 2>&1; then
            jq . /tmp/out | head -c 2000
          else
            head -c 2000 /tmp/out
          fi
          echo
          if [ "$code" != "200" ]; then
            echo "::error::cron/aiso-drain call failed ($code)"
            exit 1
          fi
