name: Cron - pipeline rebuild

# Fires POST /api/pipeline/rebuild weekly on Sunday at 05:00 UTC.
# Full rebuild from sources — expensive pass, so we run it after
# the Sunday 04:00 cleanup window finishes but well before Monday
# morning UTC traffic picks up.
#
# Required repo config:
#   secrets.CRON_SECRET     — must match server CRON_SECRET env
#   vars.TRENDINGREPO_URL  — optional; defaults to prod URL (legacy: vars.STARSCREENER_URL)

on:
  schedule:
    - cron: "0 5 * * 0"  # UTC, Sundays at 05:00
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: cron-pipeline-rebuild
  cancel-in-progress: false

env:
  BASE_URL: ${{ vars.TRENDINGREPO_URL || vars.STARSCREENER_URL || 'https://trendingrepo.com' }}

jobs:
  run:
    runs-on: ubuntu-latest
    # Rebuild can take substantially longer than an incremental ingest —
    # give it 30 min before the action runner hard-kills us. If a real
    # rebuild needs more, bump here rather than lowering the cadence.
    timeout-minutes: 30
    steps:
      - name: POST /api/pipeline/rebuild
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET is unset — refusing to fire unauthenticated"
            exit 1
          fi
          code=$(curl -sS -o /tmp/out -w "%{http_code}" --max-time 1500 -X POST \
            "$BASE_URL/api/pipeline/rebuild" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}')
          echo "HTTP $code"
          if command -v jq >/dev/null 2>&1 && jq . /tmp/out >/dev/null 2>&1; then
            jq . /tmp/out | head -c 2000
          else
            head -c 2000 /tmp/out
          fi
          echo
          if [ "$code" != "200" ]; then
            echo "::error::pipeline/rebuild call failed ($code)"
            exit 1
          fi
