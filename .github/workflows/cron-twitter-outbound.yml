name: Cron — Twitter outbound

# Fires the two Twitter outbound cron endpoints on the schedule from
# the product strategy doc:
#   - 14:00 UTC daily → daily breakouts thread (catches US workday open
#                       + UK afternoon; strongest single slot for tech)
#   - 16:00 UTC Friday → weekly recap thread (end-of-week slot)
#
# Both endpoints degrade to a no-op (status=skipped) when the
# TWITTER_OAUTH2_USER_TOKEN secret is unset, so landing this file
# doesn't start posting before the operator provisions creds.
# Audit rows still get written so the cron health dashboard shows
# "alive but unconfigured" instead of "broken."

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 16 * * 5"
  workflow_dispatch:
    inputs:
      kind:
        description: "Which thread to run (daily or weekly)"
        required: false
        default: "daily"

permissions:
  contents: read

concurrency:
  group: cron-twitter-outbound
  cancel-in-progress: false

jobs:
  fire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Pick endpoint from schedule
        id: endpoint
        run: |
          # Map schedule hour → endpoint. 14:00 UTC → daily; any other
          # schedule-fired run (today: only 16:00 Fri) → weekly.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.kind }}" in
              weekly) echo "path=/api/cron/twitter-weekly-recap" >> "$GITHUB_OUTPUT" ;;
              *)      echo "path=/api/cron/twitter-daily" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            HOUR=$(date -u +%H)
            case "$HOUR" in
              14) echo "path=/api/cron/twitter-daily" >> "$GITHUB_OUTPUT" ;;
              *)  echo "path=/api/cron/twitter-weekly-recap" >> "$GITHUB_OUTPUT" ;;
            esac
          fi

      - name: Fire outbound cron
        env:
          SS_URL: ${{ vars.STARSCREENER_URL || 'https://trendingrepo.com' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET is unset — skipping" >&2
            exit 0
          fi
          curl -sS -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${SS_URL}${{ steps.endpoint.outputs.path }}" \
            | tee /tmp/cron-response.json
          # Fail the run if the endpoint itself returned ok=false so
          # cron health dashboards surface real errors (not just
          # adapter=null skips, which have ok=true status=skipped).
          jq -e '.ok == true' /tmp/cron-response.json > /dev/null
