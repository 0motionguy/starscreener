name: Refresh repo profiles

on:
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-profile-refresh
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh repo profiles incrementally
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Phase 1B: collector dual-writes to Redis via writeDataStore().
          # enrich-repo-profiles.mjs only mirrors the FINAL snapshot to
          # Redis (per-repo intermediate writes stay file-only) to avoid
          # burning hundreds of Upstash writes per cron tick.
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/enrich-repo-profiles.mjs --mode incremental --limit 50 --max-scans 5

      # Phase 1B (commit 87e3f4e): "Commit if changed" step removed —
      # data-store writes to Redis are the durable path. Vercel no longer
      # auto-deploys on every cron tick. Restore from git for rollback.
