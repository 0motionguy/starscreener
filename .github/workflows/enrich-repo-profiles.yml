name: Refresh repo profiles

on:
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-profile-refresh
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Defensive: scripts/enrich-repo-profiles.mjs imports
        # _data-store-write.mjs which dynamic-imports `ioredis` when
        # REDIS_URL is set. (PR #9 boundary.)
        run: npm ci

      - name: Refresh repo profiles incrementally
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN_POOL: ${{ secrets.GH_TOKEN_POOL }}
        run: node scripts/enrich-repo-profiles.mjs --mode incremental --limit 50 --max-scans 5

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh repo profiles ${{ steps.ts.outputs.value }}"
          paths: |
            data/repo-profiles.json
