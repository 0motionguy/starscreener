name: Refresh repo profiles

on:
  schedule:
    - cron: "41 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: repo-profile-refresh
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh repo profiles incrementally
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/enrich-repo-profiles.mjs --mode incremental --limit 50 --max-scans 5

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.local"
          git add data/repo-profiles.json
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh repo profiles ${TS}"
          git pull --rebase origin main
          git push
