name: Refresh collection rankings

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Defensive: scripts/scrape-trending.mjs imports _data-store-write.mjs
        # which dynamic-imports `ioredis` when REDIS_URL is set. (PR #9
        # boundary.)
        run: npm ci

      - name: Refresh OSSInsight collection rankings
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-trending.mjs --only-collection-rankings

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.local"
          git add data/collection-rankings.json
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh collection rankings ${TS}"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then exit 0; fi
            echo "push attempt $i failed; retrying"
            sleep 2
          done
          exit 1
