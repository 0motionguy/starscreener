name: Refresh collection rankings

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Defensive: scripts/scrape-trending.mjs imports _data-store-write.mjs
        # which dynamic-imports `ioredis` when REDIS_URL is set. (PR #9
        # boundary.)
        run: npm ci

      - name: Refresh OSSInsight collection rankings
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-trending.mjs --only-collection-rankings

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh collection rankings ${{ steps.ts.outputs.value }}"
          paths: |
            data/collection-rankings.json
