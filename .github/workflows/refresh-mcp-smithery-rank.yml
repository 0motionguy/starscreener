name: Refresh MCP Smithery rank

# Every 6h at :11. Snapshots Smithery's default-sort list-order so
# buildMcpItem can populate smitheryRank / smitheryTotal. Cheap (one
# paginated API call) so no per-server cache; the aggregate at
# `mcp-smithery-rank` is overwritten each run.
on:
  schedule:
    - cron: "11 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-smithery-rank
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mcp-smithery-rank fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: npx tsx src/index.ts mcp-smithery-rank
