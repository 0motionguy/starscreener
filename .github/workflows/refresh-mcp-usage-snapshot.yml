name: Refresh MCP usage snapshot

# Daily at 03:30 UTC (staggered from skill-install-snapshot's 03:00 and
# skill-forks-snapshot's 03:13). Reads `trending-mcp` Redis key, captures
# per-MCP totals (installs_total, use_count, visitors_4w, downloads_7d),
# and writes a daily snapshot at `mcp-usage-snapshot:<YYYY-MM-DD>`. The
# /mcp page reader then joins against 1d/7d/30d-old snapshots to emit
# real Δ24h / Δ7d / Δ30d windows from the lifetime totals upstream
# registries publish — synthesizing the windows the upstream APIs don't
# expose. 35-day rolling window (TTL 36d).
on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-usage-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run mcp-usage-snapshot fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npx tsx src/index.ts mcp-usage-snapshot
