name: Refresh npm downloads

# Every 6h at :23. Polls api.npmjs.org/downloads/point/last-week per
# tracked MCP package and writes to Redis side-channel `mcp-downloads`.
# Also stores per-package cache at `mcp-downloads:<pkg>` (24h TTL) and
# captures `lastReleaseAt` from the registry GET (Chunk C7).
on:
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-downloads-npm
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm-downloads fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npx tsx src/index.ts npm-downloads
