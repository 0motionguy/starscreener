name: Refresh pypi downloads

# Every 6h at :37. Polls pypistats.org/api/packages/<pkg>/recent per
# tracked MCP pypi package and merges pypi7d into the per-package cache
# `mcp-downloads:<pkg>` (alongside npm7d), then publishes a slim
# aggregate at `mcp-downloads-pypi` for the app to merge with
# `mcp-downloads`.
on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mcp-downloads-pypi
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run pypi-downloads fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npx tsx src/index.ts pypi-downloads
