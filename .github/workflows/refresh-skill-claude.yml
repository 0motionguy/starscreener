name: Refresh skill claude (anthropics + community SKILL.md)

# Every 6h at :12. Populates `trending-skill` Redis key (consumed by
# /skills page as GITHUB_SKILLS_KEY). Was running off-cron via manual
# dispatch — this puts it on a schedule so the data stops going stale.
on:
  schedule:
    - cron: "12 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-claude
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run claude-skills fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_DEFAULT || secrets.GITHUB_TOKEN }}
          GH_TOKEN_POOL: ${{ secrets.GH_TOKEN_POOL }}
        run: npx tsx src/index.ts claude-skills
