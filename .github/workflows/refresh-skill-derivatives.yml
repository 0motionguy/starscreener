name: Refresh skill derivative counts

# Every 12h at :07. GitHub code search per known skill name, looking for
# `path:**/SKILL.md "name: <skill>"`. Cached 12h per slug.
on:
  schedule:
    - cron: "7 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-derivatives
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run skill-derivatives fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT_DEFAULT || secrets.GITHUB_TOKEN }}
          GH_TOKEN_POOL: ${{ secrets.GH_TOKEN_POOL }}
        run: npx tsx src/index.ts skill-derivatives
