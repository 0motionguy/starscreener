name: Refresh skill install snapshot

# Daily at 03:00 UTC. Reads `trending-skill` and `trending-skill-sh`,
# extracts the `installs7d` (or `installs`) field per skill, writes to
# `skill-install-snapshot:<YYYY-MM-DD>` so the app's buildSkillItem can
# join against N-d-ago snapshots to populate installsPrev{1d,7d,30d}.
# W5-SKILLS24H: 31-day rolling window — snapshots older than 31d are
# auto-expired by TTL + an explicit purge step. Daily fetcher ALSO mirrors
# the 1d/7d/30d-ago snapshots into fixed slot keys (skill-install-snapshot:
# prev:1d / :7d / :30d) so the reader does a single Redis read per window.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-install-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run skill-install-snapshot fetcher
        # W5-SKILLS24H: continue-on-error so a producer failure (Redis
        # brownout, transient network) never red-blocks the cron — the
        # reader gracefully falls through to whatever snapshot is still
        # cached and the scorer drops the dependent component via weight
        # renormalization.
        continue-on-error: true
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npx tsx src/index.ts skill-install-snapshot
