name: Refresh skill skillsmp (1M+ catalog)

# Every 6h at :05. Populates `trending-skill-skillsmp` Redis key.
# skillsmp.com indexes 1M+ SKILL.md across the open ecosystem; this is
# the single biggest skill source we ship.
on:
  schedule:
    - cron: "5 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: skill-skillsmp
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run skillsmp fetcher
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npx tsx src/index.ts skillsmp
