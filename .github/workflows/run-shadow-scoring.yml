name: Run shadow scoring

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: shadow-scoring
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    env:
      REDIS_URL: ${{ secrets.REDIS_URL }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install runtime deps
        run: npm ci --omit=dev --ignore-scripts

      - name: Run shadow scoring
        run: node scripts/run-shadow-scoring.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit report if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh scoring shadow report ${{ steps.ts.outputs.value }}"
          paths: |
            data/scoring-shadow-report.json
