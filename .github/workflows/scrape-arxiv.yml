name: Refresh arXiv signals

# Every 3h at :43. Staggered from huggingface (:13), lobsters (:37),
# reddit (:27), bluesky (:17), and fast-discovery (:07/:27/:47). arXiv
# announces new papers once daily so 3h is overkill, but the cadence
# matches our other trending sources without burning their rate budget.
# arXiv TOS asks for 3s between requests; we make exactly one fetch per
# run with a retry-after-honoring backoff.
on:
  schedule:
    - cron: "43 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arxiv-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh arXiv recent papers
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-arxiv.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          actor-email: "bot@trendingrepo.com"
          message: "chore(data): refresh arxiv signals ${{ steps.ts.outputs.value }}"
          paths: |
            data/arxiv-recent.json
            data/_meta/arxiv.json
            data/unknown-mentions.jsonl
