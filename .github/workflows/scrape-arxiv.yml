name: Refresh arXiv signals

# Every 3h at :43. Staggered from huggingface (:13), lobsters (:37),
# reddit (:27), bluesky (:17), and fast-discovery (:07/:27/:47). arXiv
# announces new papers once daily so 3h is overkill, but the cadence
# matches our other trending sources without burning their rate budget.
# arXiv TOS asks for 3s between requests; we make exactly one fetch per
# run with a retry-after-honoring backoff.
on:
  schedule:
    - cron: "43 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: arxiv-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh arXiv recent papers
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-arxiv.mjs

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.com"
          git add data/arxiv-recent.json data/_meta/arxiv.json data/unknown-mentions.jsonl
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh arxiv signals ${TS}"
          # AUDIT-2026-05-04 fix (Phase A1): retry rebase with -X ours when
          # `data/unknown-mentions.jsonl` lake-file conflicts with parallel
          # workflows. The lake is append-only and consumed daily by
          # promote-unknown-mentions; losing one run's tail bytes is fine.
          if ! git pull --rebase origin main; then
            echo "::warning::rebase conflict — retrying with -X ours"
            git rebase --abort || true
            git pull --rebase -X ours origin main
          fi
          git push
