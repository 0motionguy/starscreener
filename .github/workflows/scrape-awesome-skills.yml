name: Refresh awesome-skills index

# Cadence: daily at 04:23 UTC. Awesome-lists drift on a multi-day timescale,
# so 24h is plenty. Staggered minute to avoid colliding with other 04:xx
# workflows.
on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: awesome-skills-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape awesome-* skill lists
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-awesome-skills.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          actor-email: "bot@trendingrepo.com"
          message: "chore(data): refresh awesome-skills index ${{ steps.ts.outputs.value }}"
          paths: |
            data/awesome-skills.json
            data/_meta/awesome-skills.json
            data/unknown-mentions.jsonl
