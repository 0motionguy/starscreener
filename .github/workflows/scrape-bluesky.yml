name: Refresh Bluesky signals

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bluesky-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh Bluesky mentions + AI-keyword trending
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          # Phase 1B: collector dual-writes to Redis via writeDataStore().
          # Skipped silently if these secrets aren't set in the repo.
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/scrape-bluesky.mjs

      # Phase 1B (commit 87e3f4e): data-store writes to Redis are the durable
      # path. The previous "Commit if changed" step that git-pushed
      # data/bluesky-*.json to main has been removed — Vercel no longer
      # auto-deploys on every cron tick. To re-enable file push as an
      # emergency rollback, restore the pre-87e3f4e block from git history.
