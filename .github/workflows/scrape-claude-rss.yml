name: Refresh Claude (Anthropic) news

on:
  schedule:
    # Daily — Anthropic posts a few times per week, hourly polling
    # would burn rate limits for nothing. Runs off-peak vs other scrapers.
    - cron: "22 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: claude-rss-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # _data-store-write.mjs dynamic-imports ioredis when REDIS_URL is
        # set. Same defensive install as scrape-devto.yml.
        run: npm ci

      - name: Refresh Anthropic news (sitemap-derived)
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-claude-rss.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh Claude (Anthropic) news ${{ steps.ts.outputs.value }}"
          paths: |
            data/claude-rss.json
            data/_meta/claude-rss.json
