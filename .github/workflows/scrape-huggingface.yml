name: Refresh HuggingFace signals

# Every 3h at :13. Staggered from arxiv (:43), lobsters (:37), reddit (:27),
# bluesky (:17), and fast-discovery (:07/:27/:47) so we don't all hit
# upstream + git push at the same minute. HF's API is generous; 3h matches
# the trending half-life on the site without burning rate budget.
on:
  schedule:
    - cron: "13 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: huggingface-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh HuggingFace trending models
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-huggingface.mjs

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.com"
          git add data/huggingface-trending.json data/_meta/huggingface.json data/unknown-mentions.jsonl
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh huggingface signals ${TS}"
          # AUDIT-2026-05-04 fix (Phase A1): retry rebase with -X ours when
          # `data/unknown-mentions.jsonl` lake-file conflicts with parallel
          # workflows. The lake is append-only and consumed daily by
          # promote-unknown-mentions; losing one run's tail bytes is fine.
          if ! git pull --rebase origin main; then
            echo "::warning::rebase conflict — retrying with -X ours"
            git rebase --abort || true
            git pull --rebase -X ours origin main
          fi
          git push
