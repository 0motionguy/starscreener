name: Refresh Lobsters signals

# Hourly at :37 — staggered from reddit (:27), bluesky (:17), and
# fast-discovery (:07/:27/:47) so we don't all hit github.com + git push
# at the same minute. Lobsters is a small volunteer-run site; hourly is
# the gentlest cadence that still catches breakouts before they age out.
on:
  schedule:
    - cron: "37 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: lobsters-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Defensive: the scrape script imports _data-store-write.mjs which
        # dynamic-imports `ioredis` when REDIS_URL is set. Lobsters doesn't
        # currently pass REDIS_URL but the import would break the moment
        # someone adds it. (PR #9 / 89273868 boundary.)
        run: npm ci

      - name: Refresh Lobsters mentions + trending snapshot
        # No auth required — Lobsters exposes hottest/active/newest as
        # public JSON. The scraper uses a polite UA + 3 retries and
        # continues on per-page failure so one 503 doesn't kill the run.
        run: node scripts/scrape-lobsters.mjs

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.com"
          git add data/lobsters-mentions.json data/lobsters-trending.json data/_meta/lobsters.json data/unknown-mentions.jsonl
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh lobsters signals ${TS}"
          # AUDIT-2026-05-04 fix (Phase A1): retry rebase with -X ours when
          # `data/unknown-mentions.jsonl` lake-file conflicts with parallel
          # workflows. The lake is append-only and consumed daily by
          # promote-unknown-mentions; losing one run's tail bytes is fine.
          if ! git pull --rebase origin main; then
            echo "::warning::rebase conflict — retrying with -X ours"
            git rebase --abort || true
            git pull --rebase -X ours origin main
          fi
          git push
