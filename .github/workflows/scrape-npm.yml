name: Refresh npm package telemetry

on:
  schedule:
    - cron: "17 9 * * *" # daily; npm download stats lag by 24-48h
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: npm-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape npm packages
        env:
          # Phase 1B: collector dual-writes to Redis via writeDataStore().
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/scrape-npm.mjs

      # Phase 1B (commit 87e3f4e): "Commit if changed" step removed —
      # data-store writes to Redis are the durable path. Vercel no longer
      # auto-deploys on every cron tick. Restore from git for rollback.
