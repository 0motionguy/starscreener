name: Refresh npm package telemetry

on:
  schedule:
    - cron: "17 9 * * *" # daily; npm download stats lag by 24-48h
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: npm-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # Defensive: scripts/scrape-npm.mjs imports _data-store-write.mjs
        # which dynamic-imports `ioredis` when REDIS_URL is set. (PR #9
        # boundary — same shape as scrape-trending/sync-trustmrr.)
        run: npm ci

      - name: Scrape npm packages
        run: node scripts/scrape-npm.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh npm package telemetry ${{ steps.ts.outputs.value }}"
          paths: |
            data/npm-packages.json
            data/_meta/npm.json
            data/unknown-mentions.jsonl
