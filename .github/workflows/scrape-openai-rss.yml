name: Refresh OpenAI news

on:
  schedule:
    # Daily — OpenAI's RSS publishes ~1-3 items/day. Runs off-peak vs
    # other scrapers (15 minutes after claude-rss).
    - cron: "47 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openai-rss-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh OpenAI news RSS
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-openai-rss.mjs

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.local"
          git add data/openai-rss.json data/_meta/openai-rss.json
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh OpenAI news ${TS}"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then exit 0; fi
            echo "push attempt $i failed; retrying"
            sleep 2
          done
          exit 1
