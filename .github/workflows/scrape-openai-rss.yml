name: Refresh OpenAI news

on:
  schedule:
    # Daily — OpenAI's RSS publishes ~1-3 items/day. Runs off-peak vs
    # other scrapers (15 minutes after claude-rss).
    - cron: "47 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openai-rss-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh OpenAI news RSS
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-openai-rss.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh OpenAI news ${{ steps.ts.outputs.value }}"
          paths: |
            data/openai-rss.json
            data/_meta/openai-rss.json
