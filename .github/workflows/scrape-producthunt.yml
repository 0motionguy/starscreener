name: Refresh ProductHunt launches

on:
  schedule:
    - cron: "0 11,15,19,23 * * *"  # refresh throughout the PH day so votes/comments don't freeze from the early snapshot
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-ph-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape ProductHunt
        env:
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          # Phase 1B: collector dual-writes to Redis via writeDataStore().
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/scrape-producthunt.mjs

      # Phase 1B (commit 87e3f4e): "Commit if changed" step removed —
      # data-store writes to Redis are the durable path. Vercel no longer
      # auto-deploys on every cron tick. Restore from git for rollback.
