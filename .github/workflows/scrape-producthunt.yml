name: Refresh ProductHunt launches

on:
  schedule:
    - cron: "0 11,15,19,23 * * *"  # refresh throughout the PH day so votes/comments don't freeze from the early snapshot
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-ph-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape ProductHunt
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          PRODUCTHUNT_TOKENS: ${{ secrets.PRODUCTHUNT_TOKENS }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN_POOL: ${{ secrets.GH_TOKEN_POOL }}
        run: node scripts/scrape-producthunt.mjs

      - name: Commit if changed
        run: |
          git config user.name  "trendingrepo-bot"
          git config user.email "bot@trendingrepo.local"
          git add data/producthunt-launches.json data/_meta/producthunt.json data/unknown-mentions.jsonl
          if git diff --quiet --staged; then
            echo "no changes - skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): refresh ProductHunt launches ${TS}"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then exit 0; fi
            echo "push attempt $i failed; retrying"
            sleep 2
          done
          exit 1
