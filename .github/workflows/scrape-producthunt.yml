name: Refresh ProductHunt launches

on:
  schedule:
    - cron: "0 11,15,19,23 * * *"  # refresh throughout the PH day so votes/comments don't freeze from the early snapshot
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-ph-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Scrape ProductHunt
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          PRODUCTHUNT_TOKENS: ${{ secrets.PRODUCTHUNT_TOKENS }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/scrape-producthunt.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh ProductHunt launches ${{ steps.ts.outputs.value }}"
          paths: |
            data/producthunt-launches.json
            data/_meta/producthunt.json
            data/unknown-mentions.jsonl
