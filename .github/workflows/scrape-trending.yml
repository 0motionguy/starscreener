name: Scrape OSS Insight trending

on:
  schedule:
    # Hourly at :07 to avoid peak-hour scheduler delays.
    - cron: '7 * * * *'
  workflow_dispatch:

# Only the commit step needs write access; everything else is read-only.
permissions:
  contents: write

# Prevent overlap if a run is slow — the next tick will just start fresh.
concurrency:
  group: scrape-trending
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so compute-deltas.mjs can resolve 30d-old commits
          # via `git log --since/--until` + `git show <sha>:data/trending.json`.
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape OSS Insight
        run: node scripts/scrape-trending.mjs

      - name: Compute deltas from git history
        run: node scripts/compute-deltas.mjs

      - name: Commit if changed
        run: |
          git config user.name  "starscreener-bot"
          git config user.email "bot@starscreener.local"
          git add data/trending.json data/deltas.json
          if git diff --quiet --staged; then
            echo "no changes — skipping commit"
            exit 0
          fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git commit -m "chore(data): trending + deltas snapshot ${TS}"
          git push
