name: Refresh fast discovery

on:
  schedule:
    - cron: "27 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Refresh OSSInsight trending + hot collections
        env:
          # Phase 1B: collector dual-writes to Redis via writeDataStore().
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/scrape-trending.mjs --skip-collection-rankings

      - name: Discover recent GitHub repos
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/discover-recent-repos.mjs

      - name: Refresh Reddit mentions
        # NOT `continue-on-error: true`. The previous setting silently
        # masked a 2-day Reddit outage (root cause: `_load-env.mjs`
        # crashed importing `@next/env` which isn't installed in this
        # job). The script is now tolerant — but if it does fail we want
        # the workflow to surface red, not green-with-stale-data.
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/scrape-reddit.mjs

      - name: Refresh HackerNews trending + repo mentions
        # Firebase + Algolia public endpoints — no auth needed. Writes
        # hackernews-trending + hackernews-repo-mentions to Redis (and
        # mirrors to data/*.json for cold-start seed).
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/scrape-hackernews.mjs

      - name: Refresh GitHub repo metadata
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/fetch-repo-metadata.mjs

      - name: Compute deltas from git history
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: node scripts/compute-deltas.mjs

      # Phase 1B (commit 87e3f4e): "Commit if changed" step removed —
      # data-store writes to Redis are the durable path for all 9 outputs
      # (trending, deltas, hot-collections, recent-repos, repo-metadata,
      # reddit-mentions, reddit-all-posts, hackernews-trending,
      # hackernews-repo-mentions). Vercel no longer auto-deploys on every
      # cron tick. Restore from git for emergency rollback.
