name: Scrape OSS Insight trending

on:
  schedule:
    # Hourly at :07 to avoid peak-hour scheduler delays.
    - cron: '7 * * * *'
  workflow_dispatch:

# Only the commit step needs write access; everything else is read-only.
permissions:
  contents: write

# Prevent overlap if a run is slow — the next tick will just start fresh.
concurrency:
  group: scrape-trending
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Scrape OSS Insight
        run: node scripts/scrape-trending.mjs

      - name: Commit if changed
        run: |
          git config user.name  "starscreener-bot"
          git config user.email "bot@starscreener.local"
          git add data/trending.json
          if git diff --quiet --staged; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git commit -m "chore(data): refresh trending.json"
          git push

      # Always-run: re-fetches stars on known repos even when trending.json
      # didn't change. A quiet-trending hour still needs a pipeline tick,
      # and skipping would mask pipeline failures on those hours.
      - name: Trigger pipeline refresh
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          # Debug: confirm env vars are present at the expected length.
          # Value is masked by GHA; length isn't a secret.
          echo "APP_URL length: ${#APP_URL} (expected ~31)"
          echo "CRON_SECRET length: ${#CRON_SECRET} (expected >20)"
          trap 'echo "--- response body ---"; cat /tmp/cron-response.json 2>/dev/null || echo "(no body written)"' EXIT
          curl --fail-with-body -sS --max-time 30 \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o /tmp/cron-response.json -w "HTTP %{http_code} in %{time_total}s\n" \
            "${APP_URL}/api/cron/seed?limit=50"
