name: Refresh fast discovery

on:
  schedule:
    - cron: "27 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # _data-store-write.mjs dynamically imports `ioredis` when REDIS_URL
        # is set on a step. Without node_modules the import throws
        # ERR_MODULE_NOT_FOUND and the whole pipeline fails. (Boundary:
        # PR #9 / 89273868, 2026-04-28T12:00Z added the import.)
        run: npm ci

      - name: Refresh OSSInsight trending + hot collections
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-trending.mjs --skip-collection-rankings

      - name: Discover recent GitHub repos
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/discover-recent-repos.mjs

      - name: Refresh Reddit mentions
        # NOT `continue-on-error: true`. The previous setting silently
        # masked a 2-day Reddit outage (root cause: `_load-env.mjs`
        # crashed importing `@next/env` which isn't installed in this
        # job). The script is now tolerant — but if it does fail we want
        # the workflow to surface red, not green-with-stale-data.
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          REDDIT_USER_AGENTS: ${{ secrets.REDDIT_USER_AGENTS }}
        run: node scripts/scrape-reddit.mjs

      - name: Refresh HackerNews trending + repo mentions
        # Firebase + Algolia public endpoints — no auth needed. Writes
        # data/hackernews-trending.json + data/hackernews-repo-mentions.json.
        # Wired into the fast-refresh loop so HN mentions feed cross-signal
        # on the same hourly cadence as Reddit (Sprint 1 finding #1).
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/scrape-hackernews.mjs

      - name: Refresh GitHub repo metadata
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/fetch-repo-metadata.mjs

      - name: Compute deltas from git history
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/compute-deltas.mjs

      - name: Snapshot star totals into rolling history (immediate-mode deltas)
        # W2-PROD producer: writes star-snapshot:{24h,7d,30d} keys consumed
        # by /api/pipeline/deltas. Drops home-page staleness from 4h (legacy
        # git-history compute-deltas.mjs) to 30min (cron cadence).
        # Failures don't fail the workflow — the legacy deltas pipeline above
        # still ships data, and the consumer falls back to prior=null/fresh=false
        # gracefully.
        continue-on-error: true
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/snapshot-stars.mjs

      - name: Snapshot per-category metrics into rolling history (W5-CATWINDOW)
        # Writes category-metrics-snapshot:{24h,7d,30d} keys consumed by the
        # /categories index + detail surfaces (loadCategoryMetricsPrev{1d,7d,30d}).
        # Cold-start safe: empty Map → UI falls back to lifetime totals.
        continue-on-error: true
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/snapshot-category-metrics.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          message: "chore(data): refresh fast discovery snapshots ${{ steps.ts.outputs.value }}"
          paths: |
            data/trending.json
            data/deltas.json
            data/hot-collections.json
            data/recent-repos.json
            data/repo-metadata.json
            data/reddit-mentions.json
            data/reddit-all-posts.json
            data/hackernews-trending.json
            data/hackernews-repo-mentions.json
            data/_meta/reddit.json
            data/_meta/hackernews.json
            data/_meta/trending.json
            data/unknown-mentions.jsonl
