name: Snapshot /consensus daily

# 23:55 UTC every day — captures the live `consensus-trending` and
# `consensus-verdicts` payloads to date-keyed Redis slots so historical
# views and the Early-Call Hall of Fame can walk back N days.
# 90-day TTL on the destination keys.
on:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: consensus-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Capture consensus daily snapshot
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: npm run snapshot:consensus
