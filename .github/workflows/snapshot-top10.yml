name: Snapshot /top10 daily

# 23:55 UTC every day — captures the full Top10Payload to Redis under the
# key `top10:YYYY-MM-DD` so /top10/[date] can render the historical view.
# Runs ~5 min before midnight so the snapshot date matches the day that
# just ended in UTC. workflow_dispatch enables manual backfill.
on:
  schedule:
    - cron: "55 23 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: top10-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    # Hard cap so a hung Redis read can't burn the GH Actions 6h budget.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Capture Top 10 daily snapshot
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run snapshot:top10
