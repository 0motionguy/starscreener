name: Sweep staleness

# Daily 02:00 UTC sweep over per-source records to flag entries past
# `cadence × 2`. Writes data/staleness-report.json which the
# /admin/staleness page renders. Stale records here are *not* removed —
# this is a diagnostic, not a janitor. The actual rescrape pipeline owns
# refresh; the sweep just makes laggards visible to ops.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sweep-staleness
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # No npm ci needed — sweep-staleness.mjs has zero deps. Keeping the
      # workflow lean keeps the daily run cheap.

      - name: Run sweeper
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: node scripts/sweep-staleness.mjs

      - name: Compute commit timestamp
        id: ts
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        uses: ./.github/actions/git-commit-data
        with:
          actor-email: "bot@trendingrepo.com"
          message: "chore(data): refresh staleness report ${{ steps.ts.outputs.value }}"
          paths: |
            data/staleness-report.json
