name: trendingrepo-worker

on:
  push:
    branches: [main]
    paths:
      - 'apps/trendingrepo-worker/**'
      - '.github/workflows/trendingrepo-worker.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/trendingrepo-worker/**'
      - '.github/workflows/trendingrepo-worker.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/trendingrepo-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/trendingrepo-worker/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (excluding SQL parity which needs Supabase local)
        run: npx vitest run --exclude tests/sql/**
